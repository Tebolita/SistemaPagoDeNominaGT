 <div class="card">
    <p-menu [model]="items" class="flex justify-center" styleClass="w-full md:w-60 h-[100vh]">
        <ng-template #start>
            <span class="inline-flex items-center gap-1 px-2 py-2">
                <img width="31" height="33" class="block mx-auto" src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/Escudo_de_la_universidad_Mariano_G%C3%A1lvez_Guatemala.svg/3840px-Escudo_de_la_universidad_Mariano_G%C3%A1lvez_Guatemala.svg.png" />
                <span class="text-xl font-semibold">Nomina<span class="text-primary"> GT</span></span>
            </span>
             <p-divider />
            <div class="relative">
                <p-menu 
                    #avatarMenu 
                    [model]="avatarItems" 
                    [popup]="true"
                    appendTo="body"
                    styleClass="mb-2" />
                <button pRipple
                    (click)="avatarMenu.toggle($event)"
                    class="relative overflow-hidden w-full border-0 bg-transparent cursor-pointer transition-colors duration-200 hover:bg-surface-100 dark:hover:bg-surface-800"
                    style="padding: 12px 14px;">
                    
                    <div class="flex items-center gap-3 w-full">
                        <!-- Avatar con indicador online -->
                        <div class="relative flex-shrink-0">
                            <p-avatar 
                                image="https://primefaces.org/cdn/primeng/images/demo/avatar/amyelsner.png" 
                                shape="circle"
                                size="normal"
                                styleClass="border-2 border-surface-300" />
                            <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 rounded-full border-2 border-white dark:border-surface-900"></span>
                        </div>

                        <!-- Info del usuario -->
                        <div class="flex flex-col items-start flex-1 min-w-0 text-left">
                            <span class="font-medium text-sm truncate w-full">Kevin Alejandro</span>
                            <span class="text-xs text-surface-500 truncate w-full">Reyes Revolorio</span>
                            <p-badge value="Administrador" severity="info" styleClass="mt-1 text-xs" />
                        </div>
                        <!-- Icono opciones -->
                        <i class="pi pi-ellipsis-v text-surface-400 flex-shrink-0 text-xs"></i>
                    </div>
                </button>
            </div>
        </ng-template>
        <ng-template #submenuheader let-item>
            <span class="text-primary font-bold">{{ item.label }}</span>
        </ng-template>
        <ng-template #item let-item>
            <a pRipple class="flex items-center px-3 py-2 cursor-pointer" [class]="item.linkClass" [routerLink]="item.routerLink" >
                <span [class]="item.icon"></span>
                <span class="ms-2">{{ item.label }}</span>
                @if (item.badge) {
                    <p-badge class="ms-auto" [value]="item.badge" />
                }
            </a>
        </ng-template>
        <ng-template #end>

        </ng-template>
    </p-menu>
</div>
