<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="flex flex-col gap-4 p-4">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold">Gestión de Bancos</h1>
    <p-button
      label="Nuevo"
      icon="pi pi-plus"
      (onClick)="showDialog()"
      severity="success"
    ></p-button>
  </div>

  <p-table [value]="bancos()" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="NombreBanco">Nombre <p-sortIcon field="NombreBanco"></p-sortIcon></th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-banco>
      <tr>
        <td>{{ banco.NombreBanco }}</td>
        <td>
          <p-tag 
            [value]="banco.Activo ? 'Activo' : 'Inactivo'" 
            [severity]="banco.Activo ? 'success' : 'danger'"
          ></p-tag>
        </td>
        <td>
          <p-button
            icon="pi pi-pencil"
            [rounded]="true"
            [text]="true"
            (onClick)="editBanco(banco)"
            severity="warn"
            pTooltip="Editar"
            tooltipPosition="top"
          ></p-button>
          <p-button
            icon="pi pi-trash"
            [rounded]="true"
            [text]="true"
            (onClick)="deleteBanco(banco.IdBanco)"
            severity="danger"
            pTooltip="Eliminar"
            tooltipPosition="top"
          ></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  [visible]="displayDialog()"
  (visibleChange)="displayDialog.set($event)"
  [header]="isEditMode() ? 'Editar Banco' : 'Nuevo Banco'"
  [modal]="true"
  [style]="{ width: '50vw' }"
>
  <div class="flex flex-col gap-4">
    <div>
      <label class="block text-sm font-medium mb-2">Nombre del Banco</label>
      <input type="text" pInputText [(ngModel)]="form.NombreBanco" class="w-full" />
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button
      label="Cancelar"
      icon="pi pi-times"
      (onClick)="displayDialog.set(false)"
      [text]="true"
    ></p-button>
    <p-button
      label="Guardar"
      icon="pi pi-check"
      (onClick)="saveBanco()"
      severity="success"
    ></p-button>
  </ng-template>
</p-dialog>
