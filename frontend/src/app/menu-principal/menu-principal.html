<div class="card">
  <p-menu [model]="items" class="flex justify-center" styleClass="w-full md:w-60">
    <ng-template #start>
      <span class="inline-flex items-center gap-1 px-2 py-2">
        <button
          pRipple
          class="relative overflow-hidden w-full border-0 bg-transparent flex items-start p-2 pl-4 hover:bg-surface-100 dark:hover:bg-surface-800 rounded-none cursor-pointer transition-colors duration-200"
        >
          <p-avatar
            image="https://i.pinimg.com/1200x/a3/9e/1c/a39e1c70d542c32e934fdba9aaadd861.jpg"
            class="mr-2"
            shape="circle"
            size="xlarge"
          />
          <span class="inline-flex flex-col items-start alingn-left">
            <span class="font-bold">Gatito chambeador </span>
            <span class="text-sm"> Admin </span>
          </span>
        </button>
      </span>
    </ng-template>
    <ng-template #submenuheader let-item>
      <span class="text-primary font-bold">{{ item.label }}</span>
    </ng-template>
    <ng-template #item let-item>
      <a pRipple class="flex items-center px-3 py-2 cursor-pointer" [class]="item.linkClass">
        <span [class]="item.icon"></span>
        <span class="ms-2">{{ item.label }}</span>
        @if (item.badge) {
        <p-badge class="ms-auto" [value]="item.badge" />
        }
      </a>
    </ng-template>
  </p-menu>
</div>
