<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="flex flex-col gap-4 p-4">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold">Estados de Nómina</h1>
    <p-button
      label="Nuevo Estado"
      icon="pi pi-plus"
      (onClick)="showDialog()"
      severity="success"
    ></p-button>
  </div>

  <p-table [value]="estados()" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template pTemplate="header">
      <tr>
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Orden</th>
        <th>Requiere Aprobación</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-estado>
      <tr>
        <td>{{ estado.NombreEstado }}</td>
        <td>{{ estado.Descripcion || '-' }}</td>
        <td>{{ estado.Orden }}</td>
        <td>
          <p-tag
            [value]="estado.RequiereAprobacion ? 'Sí' : 'No'"
            [severity]="estado.RequiereAprobacion ? 'warn' : 'info'"
          ></p-tag>
        </td>
        <td>
          <p-tag
            [value]="getEstadoLabel(estado.Activo)"
            [severity]="getEstadoSeverity(estado.Activo)"
          ></p-tag>
        </td>
        <td>
          <p-button
            icon="pi pi-pencil"
            [rounded]="true"
            [text]="true"
            (onClick)="showDialog(estado)"
            severity="info"
            pTooltip="Editar"
            tooltipPosition="top"
          ></p-button>
          <p-button
            icon="pi pi-trash"
            [rounded]="true"
            [text]="true"
            (onClick)="deleteEstado(estado)"
            severity="danger"
            pTooltip="Eliminar"
            tooltipPosition="top"
          ></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  [visible]="displayDialog()"
  (visibleChange)="displayDialog.set($event)"
  [header]="editingEstado ? 'Editar Estado de Nómina' : 'Nuevo Estado de Nómina'"
  [modal]="true"
  [style]="{ width: '50vw', maxWidth: '90vw' }"
  [resizable]="false"
>
  <div class="flex flex-col gap-4">
    <div>
      <label class="block text-sm font-medium mb-2">Nombre del Estado *</label>
      <input
        pInputText
        [(ngModel)]="form.NombreEstado"
        placeholder="Ej: GENERADA, PENDIENTE_APROBACION"
        class="w-full"
        maxlength="50"
      />
    </div>

    <div>
      <label class="block text-sm font-medium mb-2">Descripción</label>
      <textarea
        pInputTextarea
        [(ngModel)]="form.Descripcion"
        placeholder="Descripción opcional del estado"
        class="w-full"
        rows="3"
        maxlength="255"
      ></textarea>
    </div>

    <div>
      <label class="block text-sm font-medium mb-2">Orden *</label>
      <p-inputNumber
        [(ngModel)]="form.Orden"
        [min]="1"
        [max]="100"
        placeholder="Orden de aparición"
        class="w-full"
      ></p-inputNumber>
    </div>

    <div class="flex items-center gap-2">
      <p-checkbox
        [(ngModel)]="form.RequiereAprobacion"
        inputId="requiereAprobacion"
      ></p-checkbox>
      <label for="requiereAprobacion" class="text-sm">Requiere aprobación</label>
    </div>

    <div class="flex items-center gap-2">
      <p-checkbox
        [(ngModel)]="form.Activo"
        inputId="activo"
      ></p-checkbox>
      <label for="activo" class="text-sm">Estado activo</label>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button
      label="Cancelar"
      icon="pi pi-times"
      (onClick)="hideDialog()"
      severity="secondary"
    ></p-button>
    <p-button
      label="Guardar"
      icon="pi pi-check"
      (onClick)="saveEstado()"
      severity="success"
    ></p-button>
  </ng-template>
</p-dialog>
