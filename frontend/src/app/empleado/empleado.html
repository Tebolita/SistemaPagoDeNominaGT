<div class="inicio-layout">
  <aside class="sidebarUser">
    <h1 class="text-xl">Empleados</h1>
    <p-divider>
        <b>Opciones</b>
    </p-divider>

    <div class="card w-[98%]">
        <p-menubar [model]="items">
            <ng-template #item let-item>
                <p-button 
                    class="flex items-center px-3 py-2 cursor-pointer" 
                    [severity]="item.severity">
                    <span [class]="item.icon"></span>
                </p-button>
            </ng-template>
        </p-menubar>
    </div>
    <p-divider>
        <b>Usuarios</b>
    </p-divider>
    <p *ngIf="error" class="text-red-300 text-xs text-center">{{ error }}</p>
    <div class="card flex sm:justify-center">
        <p-toast />
        <ul class="m-0 p-2 list-none flex flex-col gap-1 w-full">
            @for (user of users; track user.IdEmpleado) {
                <li
                    class="flex items-center gap-3 px-3 py-2 rounded-lg border cursor-pointer transition-all duration-150 cardUser"
                    [class.border-transparent]="selectedUser?.IdEmpleado !== user.IdEmpleado"
                    [class.bg-transparent]="selectedUser?.IdEmpleado !== user.IdEmpleado"
                    [class.hover:bg-surface-100]="selectedUser?.IdEmpleado !== user.IdEmpleado"
                    [class.border-primary]="selectedUser?.IdEmpleado === user.IdEmpleado"
                    [class.bg-primary-50]="selectedUser?.IdEmpleado === user.IdEmpleado"
                    [class.dark:bg-primary-900-20]="selectedUser?.IdEmpleado === user.IdEmpleado"
                    (click)="onSelectUser(user)"  
                    (contextmenu)="onContextMenu($event, user)"
                >
                
                <!-- Avatar -->
                <img
                    class="w-9 h-9 rounded-full flex-shrink-0 border border-surface-200 dark:border-surface-700 object-cover"
                    [src]="user.Fotografia"
                    [alt]="user.Nombres"
                />

                <!-- Nombre -->
                <span 
                    class="flex-1 text-sm font-medium truncate"
                    [class.text-primary]="selectedUser?.IdEmpleado === user.IdEmpleado">
                    {{ user.Nombres }} {{ user.Apellidos }}
                </span>

                <!-- Badge rol -->
                <p-tag 
                    [value]="user.Usuario[0].RolUsuario.NombreRol" 
                    styleClass="text-sm" />
                </li>
            }
        </ul>

        <p-contextmenu #cm [model]="usuarios"/>
    </div>
  </aside>

  <main class="content-area">
    @if (selectedUser) {
        <div class="card">
            <p-fieldset class="w-full" legend="Información General">
                <div class="flex gap-2">

                    <!-- Columna izquierda — Avatar -->
                    <div class="flex flex-col items-center gap-3 w-[300px] flex-shrink-0">
                        <p-avatar 
                            shape="circle"
                            [image]="selectedUser.Fotografia"
                            [style]="{ width: '120px', height: '120px' }" />
                        <span class="font-semibold text-lg">
                            {{ selectedUser.Nombres }} {{ selectedUser.Apellidos }}
                        </span>
                        <div class="flex justify-center flex-wrap gap-4">
                        <p-tag 
                            [value]="selectedUser.Usuario[0]?.RolUsuario?.NombreRol ?? 'Sin rol'" 
                            severity="info" />
                        <p-tag 
                            [value]="selectedUser.Puesto.NombrePuesto ? selectedUser.Puesto.NombrePuesto : 'Puesto no asignado'" 
                            severity="warn" />                            
                        </div>

                        <div class="flex justify-center flex-wrap gap-4">
                            <p-tag 
                                [value]="selectedUser.Estado ? 'Activo' : 'Inactivo'" 
                                [severity]="selectedUser.Estado ? 'success' : 'danger'" />
                            <p-tag 
                                [value]="selectedUser.Genero ? 'Femenino' : 'Masculino'" 
                                [severity]="selectedUser.Genero ? 'success' : 'danger'" />    
                        </div>

                        <p *ngIf="messageResponsive" class="text-green-300 text-xs text-center">{{ messageResponsive }}</p>

                        <p-divider   />
                        <div class="flex justify-center flex-wrap gap-4">
                            <p-button icon="pi pi-save" severity="success" (click)="onUpdateUser()"   />
                            <p-button icon="pi pi-times" severity="danger"  (click)="onDeleteUser()"/>
                        </div>                     
                    </div>

                    <p-divider layout="vertical" />

                    <!-- Columna derecha — Información -->
                    <div class="flex flex-col gap-4 flex-1">
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div class="flex flex-col gap-1">
                                <label class="text-xs text-surface-500">Nombres</label>
                                <input pInputText [(ngModel)]="selectedUser.Nombres" [readonly]="!(editarUsuario)" />
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-xs text-surface-500">Apellidos</label>
                                <input pInputText [(ngModel)]="selectedUser.Apellidos" [readonly]="!(editarUsuario)" />
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-xs text-surface-500">DPI</label>
                                <input pInputText [(ngModel)]="selectedUser.DPI" [readonly]="!(editarUsuario)" />
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-xs text-surface-500">NIT</label>
                                <input pInputText [(ngModel)]="selectedUser.NIT" [readonly]="!(editarUsuario)" />
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-xs text-surface-500">Correo</label>
                                <input pInputText [(ngModel)]="selectedUser.CorreoPersonal" [readonly]="!(editarUsuario)" />
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-xs text-surface-500">Teléfono</label>
                                <input pInputText [(ngModel)]="selectedUser.Telefono" [readonly]="!(editarUsuario)" />
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-xs text-surface-500">Dirección</label>
                                <input pInputText [(ngModel)]="selectedUser.Direccion" [readonly]="!(editarUsuario)" />
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-xs text-surface-500">Estado civil</label>
                                <input pInputText [(ngModel)]="selectedUser.EstadoCivil" [readonly]="!(editarUsuario)" />
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-xs text-surface-500">Fecha de ingreso</label>
                                <input pInputText [(ngModel)]="selectedUser.FechaIngresa"  readonly />
                            </div>
                            <div class="flex flex-col gap-1">
                                <label class="text-xs text-surface-500">Fecha de eliminicación</label>
                                <input pInputText [(ngModel)]="selectedUser.FechaEliminacion" readonly />
                            </div>
                        </div>
                    </div>

                </div>
            </p-fieldset>
        </div>
        
        <div class="card mt-4">
            <p-fieldset class="w-full" legend="Configuraciones">
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="text-xs text-surface-500">Rol de usuario</label>
                        <p-select [options]="cities" [(ngModel)]="selectedCity" optionLabel="name" placeholder="Select a City" class="w-full md:w-56" />
                    </div>
                    <div class="flex flex-col gap-1">
                        <label class="text-xs text-surface-500">Puesto</label>
                        <p-select [options]="cities" [(ngModel)]="selectedCity" optionLabel="name" placeholder="Select a City" class="w-full md:w-56" />
                    </div>
                </div>
            </p-fieldset>
        </div>

        <div class="card mt-4">
            <p-fieldset class="w-full" legend="Incidencias">

            </p-fieldset>
        </div>

        <div class="card mt-4">
            <p-fieldset class="w-full" legend="Vacaciones">

            </p-fieldset>
        </div> 

        <div class="card mt-4">
            <p-fieldset class="w-full" legend="Asistencias">

            </p-fieldset>
        </div> 

    }
  </main>
</div>
