<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="flex flex-col gap-4 p-4">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold">Gestión de Puestos</h1>
    <p-button
      label="Nuevo"
      icon="pi pi-plus"
      (onClick)="showDialog()"
      severity="success"
    ></p-button>
  </div>

  <p-table [value]="puestos()" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="NombrePuesto">Nombre <p-sortIcon field="NombrePuesto"></p-sortIcon></th>
        <th>Departamento</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-puesto>
      <tr>
        <td>{{ puesto.NombrePuesto }}</td>
        <td>{{ getDepartamentoName(puesto.IdDepartamento) }}</td>
        <td>
          <p-tag 
            [value]="puesto.Activo ? 'Activo' : 'Inactivo'" 
            [severity]="puesto.Activo ? 'success' : 'danger'"
          ></p-tag>
        </td>
        <td>
          <p-button
            icon="pi pi-pencil"
            [rounded]="true"
            [text]="true"
            (onClick)="editPuesto(puesto)"
            severity="warn"
            pTooltip="Editar"
            tooltipPosition="top"
          ></p-button>
          <p-button
            icon="pi pi-trash"
            [rounded]="true"
            [text]="true"
            (onClick)="deletePuesto(puesto.IdPuesto)"
            severity="danger"
            pTooltip="Eliminar"
            tooltipPosition="top"
          ></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  [visible]="displayDialog()"
  (visibleChange)="displayDialog.set($event)"
  [header]="isEditMode() ? 'Editar Puesto' : 'Nuevo Puesto'"
  [modal]="true"
  [style]="{ width: '50vw' }"
>
  <div class="flex flex-col gap-4">
    <div>
      <label class="block text-sm font-medium mb-2">Nombre del Puesto</label>
      <input type="text" pInputText [(ngModel)]="form.NombrePuesto" class="w-full" />
    </div>
    <div>
      <label class="block text-sm font-medium mb-2">Departamento</label>
      <p-select
        [options]="departamentos()"
        [(ngModel)]="form.IdDepartamento"
        optionLabel="NombreDepartamento"
        optionValue="IdDepartamento"
        placeholder="Seleccionar departamento"
        class="w-full"
      ></p-select>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button
      label="Cancelar"
      icon="pi pi-times"
      (onClick)="displayDialog.set(false)"
      [text]="true"
    ></p-button>
    <p-button
      label="Guardar"
      icon="pi pi-check"
      (onClick)="savePuesto()"
      severity="success"
    ></p-button>
  </ng-template>
</p-dialog>
