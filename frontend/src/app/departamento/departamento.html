<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>

<div class="flex flex-col gap-4 p-4">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold">Gestión de Departamentos</h1>
    <p-button
      label="Nuevo"
      icon="pi pi-plus"
      (onClick)="showDialog()"
      [severity]="'success'"
    ></p-button>
  </div>

  <p-table [value]="departamentos()" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template pTemplate="header">
      <tr>
        <th pSortableColumn="NombreDepartamento">Nombre <p-sortIcon field="NombreDepartamento"></p-sortIcon></th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-dept>
      <tr>
        <td>{{ dept.NombreDepartamento }}</td>
        <td>
          <p-tag 
            [value]="dept.Activo ? 'Activo' : 'Inactivo'" 
            [severity]="dept.Activo ? 'success' : 'danger'"
          ></p-tag>
        </td>
        <td>
          <p-button
            icon="pi pi-pencil"
            [rounded]="true"
            [text]="true"
            (onClick)="editDepartamento(dept)"
            severity="warn"
            pTooltip="Editar"
            tooltipPosition="top"
          ></p-button>
          <p-button
            icon="pi pi-trash"
            [rounded]="true"
            [text]="true"
            (onClick)="deleteDepartamento(dept.IdDepartamento)"
            severity="danger"
            pTooltip="Eliminar"
            tooltipPosition="top"
          ></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>

<p-dialog
  [visible]="displayDialog()"
  (visibleChange)="displayDialog.set($event)"
  [header]="isEditMode() ? 'Editar Departamento' : 'Nuevo Departamento'"
  [modal]="true"
  [style]="{ width: '50vw' }"
>
  <div class="flex flex-col gap-4">
    <div>
      <label class="block text-sm font-medium mb-2">Nombre del Departamento</label>
      <input
        type="text"
        pInputText
        [(ngModel)]="form.NombreDepartamento"
        class="w-full"
      />
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button
      label="Cancelar"
      icon="pi pi-times"
      (onClick)="displayDialog.set(false)"
      [text]="true"
    ></p-button>
    <p-button
      label="Guardar"
      icon="pi pi-check"
      (onClick)="saveDepartamento()"
      severity="success"
    ></p-button>
  </ng-template>
</p-dialog>
