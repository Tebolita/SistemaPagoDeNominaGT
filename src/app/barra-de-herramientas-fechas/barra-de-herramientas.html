<div class="card">
  <p-toolbar>
    <ng-template #start>
      <div class="card flex justify-center">
        <p-selectbutton
          [options]="stateOptions"
          [(ngModel)]="fecha"
          optionLabel="label"
          optionValue="fecha"
          aria-labelledby="basic"
        />
      </div>
    </ng-template>
    <ng-template #center> </ng-template>
    <ng-template #end>
      <div class="card flex flex-wrap gap-4 justify-center">
        <p-button
          label="Descargar reporte"
          [raised]="true"
          severity="secondary"
          icon="pi pi-file-export"
          size="large"
        />
        <p-iftalabel>
          <p-datepicker
            [(ngModel)]="fechasPersonalizadas"
            [iconDisplay]="'input'"
            [showIcon]="true"
            inputId="icondisplay"
            selectionMode="range"
            inputId="fecha"
            dateFormat="dd/mm/yy"
          />
          <label for="fecha">Fecha personalizada</label>
        </p-iftalabel>
      </div>
    </ng-template>
  </p-toolbar>
</div>
